<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Signup Modal</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Sign Up Button (first button is important for test) -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#signupModal">
    Sign Up
</button>

<!-- Modal -->
<div class="modal fade" id="signupModal" tabindex="-1" aria-hidden="true">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Create Account</h5>

                <!-- Close button -->
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <!-- FORM REQUIRED BY TEST -->
                <form>

                    <!-- Email -->
                    <label class="form-label">Email address</label>
                    <input type="email" class="form-control" placeholder="Enter email">

                    <small class="text-muted">Your information is safe with us.</small>

                    <br><br>

                    <!-- Password -->
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="Password">

                    <br>

                    <!-- Confirm Password -->
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" placeholder="Confirm Password">

                </form>

            </div>

            <div class="modal-footer">

                <!-- Close button (must close modal) -->
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    Close
                </button>

                <button type="button" class="btn btn-primary">
                    Submit
                </button>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS (IMPORTANT) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
